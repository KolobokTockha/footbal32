<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FC Mobile - Симуляция сезона с прокачкой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            font-family: 'Poppins', 'Segoe UI', 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
            background: #0a2f1f;
        }

        .game-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('Снимок экрана (3)-fotor-2026032119580.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .overlay-dark {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        .game-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1800px;
            padding: 1.5rem;
            animation: fadeInUp 0.6s ease forwards;
            display: flex;
            gap: 1.5rem;
        }

        .main-content {
            flex: 2;
        }

        .right-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Блок клуба */
        .club-card {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 1rem;
            border: 1px solid rgba(255, 215, 0, 0.4);
            text-align: center;
            margin-bottom: 1rem;
        }

        .club-name {
            font-size: 1.3rem;
            font-weight: 900;
            color: #ffcc33;
            text-shadow: 1px 1px 0 #b45f06;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        .club-league {
            font-size: 0.8rem;
            color: #ffaa66;
            margin-top: 0.3rem;
        }

        .club-rating {
            font-size: 0.9rem;
            color: #2ecc71;
            margin-top: 0.3rem;
        }

        /* Блок рейтинга игрока с прокачкой */
        .player-rating-card {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 1.2rem;
            border: 1px solid rgba(255, 215, 0, 0.4);
        }

        .rating-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffcc33;
            margin-bottom: 0.8rem;
            text-align: center;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        .xp-bar {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .xp-text {
            font-size: 0.9rem;
            color: #ffaa66;
        }

        .xp-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffcc33;
        }

        .rating-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .rating-stat {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            padding: 0.5rem;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .rating-stat:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.02);
        }

        .rating-stat-name {
            font-size: 0.7rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .rating-stat-value {
            font-size: 1.3rem;
            font-weight: 900;
            color: #2ecc71;
            font-family: monospace;
        }

        .upgrade-cost {
            font-size: 0.65rem;
            color: #ffaa66;
            margin-top: 0.2rem;
        }

        .overall-rating {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,170,0,0.1));
            border-radius: 15px;
            padding: 0.6rem;
            text-align: center;
            margin-top: 0.5rem;
        }

        .overall-rating span:first-child {
            font-size: 0.85rem;
            color: #ffcc77;
        }

        .overall-rating span:last-child {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ffaa00;
            margin-left: 0.5rem;
        }

        /* Календарь */
        .calendar-sidebar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 1.2rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
            max-height: 45vh;
            overflow-y: auto;
        }

        .calendar-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffcc33;
            text-align: center;
            margin-bottom: 0.8rem;
        }

        .season-counter {
            text-align: center;
            font-size: 0.75rem;
            color: #ffaa66;
            margin-bottom: 0.8rem;
        }

        .calendar-months {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .calendar-month {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 0.5rem;
            border-left: 3px solid #ffcc33;
        }

        .calendar-month.current {
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,170,0,0.2));
            border-left: 3px solid #ffaa00;
        }

        .calendar-month.completed {
            border-left-color: #2ecc71;
        }

        .month-name {
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffdd77;
        }

        .month-progress {
            font-size: 0.65rem;
            color: #aaa;
        }

        .month-status {
            font-size: 0.6rem;
            color: #2ecc71;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .season-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .month-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffcc33, #ffaa00);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 900;
            color: #1e2a1c;
        }

        .season-number {
            font-size: 0.8rem;
            color: #ffaa66;
            margin-top: 0.2rem;
        }

        .games-progress {
            font-size: 0.9rem;
            color: #ddd;
        }

        .player-stats {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 0.8rem;
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            text-align: center;
        }

        .stat-item {
            padding: 0.2rem;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #ffcc77;
        }

        .stat-number {
            font-size: 1.2rem;
            font-weight: 900;
            color: #2ecc71;
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .match-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 0.6rem;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .match-card.played {
            border-color: #2ecc71;
            background: rgba(46,204,113,0.2);
        }

        .match-number {
            font-size: 0.65rem;
            color: #ffcc77;
        }

        .match-result {
            font-size: 0.9rem;
            font-weight: 900;
            color: #fff;
        }

        .match-score {
            font-size: 0.8rem;
            color: #2ecc71;
        }

        .simulate-btn {
            display: block;
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Impact', 'Arial Black', sans-serif;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin-bottom: 0.6rem;
        }

        .reset-season-btn, .music-btn, .back-btn {
            display: block;
            width: 100%;
            padding: 0.6rem;
            font-size: 0.85rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }

        .reset-season-btn {
            background: linear-gradient(135deg, #e67e22, #f39c12);
        }

        .music-btn {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
        }

        .music-btn.hidden {
            display: none;
        }

        .back-btn {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            margin-bottom: 0;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a2a1a, #0a1a0a);
            border-radius: 30px;
            padding: 1.2rem;
            text-align: center;
            max-width: 350px;
            width: 90%;
            border: 2px solid gold;
        }

        .modal-content h2 {
            font-size: 1.3rem;
            color: gold;
        }

        .award-item {
            background: rgba(0,0,0,0.5);
            margin: 0.6rem 0;
            padding: 0.6rem;
            border-radius: 15px;
        }

        .award-name {
            font-size: 1rem;
            font-weight: bold;
            color: #ffcc33;
        }

        .close-modal {
            margin-top: 1rem;
            padding: 0.5rem 1.2rem;
            background: #e67e22;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 1000px) {
            .game-content {
                flex-direction: column;
            }
            .right-sidebar {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .player-rating-card, .calendar-sidebar, .club-card {
                flex: 1;
                min-width: 250px;
            }
            .rating-stats {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 700px) {
            .rating-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .matches-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="game-screen">
    <div class="overlay-dark"></div>
    
    <div class="game-content">
        <div class="main-content">
            <div class="season-header">
                <div class="month-badge" id="monthDisplay">ЯНВАРЬ</div>
                <div class="season-number" id="seasonDisplay">СЕЗОН 1</div>
                <div class="games-progress" id="progressDisplay">Матчи: 0 / 4</div>
            </div>

            <div class="player-stats">
                <div class="stat-item">
                    <div class="stat-label">ГОЛЫ</div>
                    <div class="stat-number" id="goalsStat">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">ГОЛЕВЫЕ ПАСЫ</div>
                    <div class="stat-number" id="assistsStat">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">СУХИЕ МАТЧИ</div>
                    <div class="stat-number" id="cleanSheetsStat">0</div>
                </div>
            </div>

            <div class="matches-grid" id="matchesGrid"></div>

            <button class="simulate-btn" id="simulateBtn">▶ СЫГРАТЬ МАТЧ (+10 опыта)</button>
            <button class="reset-season-btn" id="resetSeasonBtn">🔄 СБРОСИТЬ СТАТИСТИКУ</button>
            <button class="music-btn" id="musicBtn">🎵 ВКЛЮЧИТЬ МУЗЫКУ</button>
            <button class="back-btn" id="backToMenuBtn">◀ ВЕРНУТЬСЯ В МЕНЮ</button>
        </div>

        <div class="right-sidebar">
            <!-- Блок текущего клуба -->
            <div class="club-card">
                <div class="club-name" id="clubName">РЕАЛ МАДРИД</div>
                <div class="club-league" id="clubLeague">🇪🇸 ИСПАНИЯ • ЛА ЛИГА</div>
                <div class="club-rating" id="clubRating">⭐ РЕЙТИНГ КЛУБА: 95</div>
            </div>

            <div class="player-rating-card">
                <div class="rating-title">⚡ ПРОКАЧКА НАВЫКОВ ⚡</div>
                <div class="xp-bar">
                    <div class="xp-text">⭐ ОЧКИ ОПЫТА ⭐</div>
                    <div class="xp-value" id="xpPoints">0</div>
                    <div class="xp-text">(за матч +10 опыта)</div>
                </div>
                <div class="rating-stats" id="ratingStats"></div>
                <div class="overall-rating">
                    <span>ОБЩИЙ РЕЙТИНГ</span>
                    <span id="overallRating">0</span>
                </div>
                <div class="xp-text" style="font-size: 0.7rem; margin-top: 0.5rem;">💡 Чем выше навык, тем дороже прокачка!</div>
            </div>

            <div class="calendar-sidebar">
                <div class="calendar-title">📅 КАЛЕНДАРЬ СЕЗОНА</div>
                <div class="calendar-months" id="calendarMonths"></div>
            </div>
        </div>
    </div>
</div>

    const countries = Object.keys(clubsByCountry);

    // Получить клуб по рейтингу игрока
    function getClubByRating(playerRating) {
        let availableClubs = [];
        
        for (const country of countries) {
            for (const club of clubsByCountry[country]) {
                availableClubs.push({ ...club, country });
            }
        }
        
        // Сортировка клубов по рейтингу
        availableClubs.sort((a, b) => b.rating - a.rating);
        
        // Чем выше рейтинг игрока, тем в более топовый клуб
        let index;
        if (playerRating >= 85) {
            index = Math.floor(Math.random() * 10); // топ-10 клубов
        } else if (playerRating >= 75) {
            index = 10 + Math.floor(Math.random() * 15); // середина
        } else {
            index = 25 + Math.floor(Math.random() * (availableClubs.length - 25)); // низ
        }
        
        index = Math.min(index, availableClubs.length - 1);
        return availableClubs[index];
    }

        document.getElementById('clubLeague').innerHTML = `${flagEmojis[currentClub.country] || '🏆'} ${currentClub.country} • ${currentClub.league}`;
        document.getElementById('clubRating').innerHTML = `⭐ РЕЙТИНГ КЛУБА: ${currentClub.rating}`;

    // ========== ХАРАКТЕРИСТИКИ ИГРОКА ==========
    let playerStats = JSON.parse(localStorage.getItem('fcPlayerStats'));
    let xpPoints = parseInt(localStorage.getItem('fcXP')) || 0;
    
    if (!playerStats) {
        playerStats = {
            crosses: 65,
            pass: 65,
            speed: 65,
            acceleration: 65,
            closeShot: 65,
            longShot: 65
        };
        localStorage.setItem('fcPlayerStats', JSON.stringify(playerStats));
    }
    
    const ratingNames = {
        crosses: 'НАВЕСЫ',
        pass: 'ПАС',
        speed: 'СКОРОСТЬ',
        acceleration: 'УСКОРЕНИЕ',
        closeShot: 'БЛИЖНИЙ УДАР',
        longShot: 'ДАЛЬНИЙ УДАР'
    };
    
    const ratingKeys = ['crosses', 'pass', 'speed', 'acceleration', 'closeShot', 'longShot'];
    
    function getUpgradeCost(currentValue) {
        if (currentValue >= 95) return 200;
        if (currentValue >= 85) return 120;
        if (currentValue >= 75) return 80;
        if (currentValue >= 70) return 60;
        return 40;
    }
    
    function updateRatingDisplay() {
        const container = document.getElementById('ratingStats');
        container.innerHTML = '';
        for (const key of ratingKeys) {
            const value = playerStats[key];
            const cost = getUpgradeCost(value);
            const div = document.createElement('div');
            div.className = 'rating-stat';
            div.innerHTML = `
                <div class="rating-stat-name">${ratingNames[key]}</div>
                <div class="rating-stat-value">${value}</div>
                <div class="upgrade-cost">⬆️ +1 = ${cost} опыта</div>
            `;
            div.onclick = () => upgradeSkill(key);
            container.appendChild(div);
        }
        
        const total = ratingKeys.reduce((sum, key) => sum + playerStats[key], 0);
        const avgRating = Math.round(total / 6);
        document.getElementById('overallRating').textContent = avgRating;
        document.getElementById('xpPoints').textContent = xpPoints;
        savePlayerData();
        
        // Обновляем клуб при изменении рейтинга
        updateClubDisplay();
    }
    
    function upgradeSkill(skillKey) {
        const currentValue = playerStats[skillKey];
        const cost = getUpgradeCost(currentValue);
        
        if (currentValue >= 99) {
            showToast(`⚠️ ${ratingNames[skillKey]} уже достиг максимума (99)!`);
            return;
        }
        
        if (xpPoints >= cost) {
            xpPoints -= cost;
            playerStats[skillKey]++;
            updateRatingDisplay();
            showToast(`✨ ${ratingNames[skillKey]} улучшен до ${playerStats[skillKey]}! (${cost} опыта) ✨`);
            savePlayerData();
        } else {
            showToast(`❌ Недостаточно опыта! Нужно ${cost} опыта (у вас ${xpPoints})`);
        }
    }
    
    function addXP(amount) {
        xpPoints += amount;
        document.getElementById('xpPoints').textContent = xpPoints;
        savePlayerData();
        showToast(`⭐ +${amount} опыта! Всего: ${xpPoints} ⭐`);
    }
    
    function savePlayerData() {
        localStorage.setItem('fcPlayerStats', JSON.stringify(playerStats));
        localStorage.setItem('fcXP', xpPoints);
    }
    
    function showToast(message, isSuccess = true) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.position = 'fixed';
        toast.style.bottom = '30%';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = 'rgba(0,0,0,0.9)';
        toast.style.color = isSuccess ? '#ffdd77' : '#ffaa66';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '1000';
        toast.style.fontSize = '0.9rem';
        toast.style.fontWeight = 'bold';
        toast.style.whiteSpace = 'nowrap';
        toast.style.animation = 'fadeInOut 2s ease forwards';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // ========== ИГРОВАЯ ЛОГИКА ==========
    const months = ['ЯНВАРЬ', 'ФЕВРАЛЬ', 'МАРТ', 'АПРЕЛЬ', 'МАЙ', 'ИЮНЬ', 'ИЮЛЬ', 'АВГУСТ', 'СЕНТЯБРЬ', 'ОКТЯБРЬ', 'НОЯБРЬ', 'ДЕКАБРЬ'];
    
    let currentMonth = 0;
    let currentMatch = 0;
    let goals = 0;
    let assists = 0;
    let cleanSheets = 0;
    let seasonNumber = 1;
    let matches = [];
    
    function loadGame() {
        const saved = localStorage.getItem('fcSeasonData');
        if (saved) {
            const data = JSON.parse(saved);
            currentMonth = data.currentMonth;
            currentMatch = data.currentMatch;
            goals = data.goals;
            assists = data.assists;
            cleanSheets = data.cleanSheets;
            seasonNumber = data.seasonNumber || 1;
            matches = data.matches;
        } else {
            resetSeasonData(false);
        }
        updateUI();
    }
    
    function resetSeasonData(showToastMsg = true) {
        currentMonth = 0;
        currentMatch = 0;
        goals = 0;
        assists = 0;
        cleanSheets = 0;
        matches = [];
        for (let i = 0; i < 12; i++) {
            matches[i] = [];
            for (let j = 0; j < 4; j++) {
                matches[i][j] = null;
            }
        }
        saveGame();
        if (showToastMsg) showToast('📊 Статистика сезона сброшена!');
    }
    
    function saveGame() {
        const data = { currentMonth, currentMatch, goals, assists, cleanSheets, seasonNumber, matches };
        localStorage.setItem('fcSeasonData', JSON.stringify(data));
    }
    
    function simulateMatch() {
        if (currentMonth >= 12) {
            currentMonth = 0;
            currentMatch = 0;
            seasonNumber++;
            for (let i = 0; i < 12; i++) {
                matches[i] = [];
                for (let j = 0; j < 4; j++) {
                    matches[i][j] = null;
                }
            }
            saveGame();
            updateUI();
            showToast(`🏆 НОВЫЙ СЕЗОН ${seasonNumber}! ВЫ ВЫСТУПАЕТЕ ЗА ${currentClub.name} 🏆`);
            return;
        }
        
        if (currentMatch >= 4) {
            currentMonth++;
            currentMatch = 0;
            if (currentMonth >= 12) {
                showEndOfSeasonAwards();
            }
            saveGame();
            updateUI();
            return;
        }
        
        const avgRating = ratingKeys.reduce((sum, key) => sum + playerStats[key], 0) / 6;
        
        let playerGoals = Math.floor(Math.random() * 3) + 1;
        if (avgRating > 80) playerGoals += Math.floor(Math.random() * 2);
        if (avgRating > 90) playerGoals += 1;
        
        let opponentGoals = Math.floor(Math.random() * (avgRating > 75 ? 2 : 3));
        const hasAssist = Math.random() > (avgRating > 80 ? 0.3 : 0.5);
        const isCleanSheet = opponentGoals === 0;
        
        goals += playerGoals;
        if (hasAssist && playerGoals > 0) assists += Math.min(playerGoals, 2);
        if (isCleanSheet) cleanSheets++;
        
        addXP(10);
        
        matches[currentMonth][currentMatch] = {
            goals: playerGoals,
            opponent: opponentGoals,
            win: playerGoals > opponentGoals
        };
        
        currentMatch++;
        saveGame();
        updateUI();
        
        if (currentMatch === 4) {
            setTimeout(() => simulateMatch(), 200);
        }
    }
    
    function showEndOfSeasonAwards() {
        const avgRating = Math.round(ratingKeys.reduce((sum, key) => sum + playerStats[key], 0) / 6);
        const ballonDor = goals + assists > 25 ? 'ВАШ ИГРОК' : ['Мбаппе', 'Холанд', 'Винисиус'][Math.floor(Math.random() * 3)];
        const goldenBoot = goals > 15 ? 'ВАШ ИГРОК' : ['Мбаппе', 'Холанд', 'Кейн'][Math.floor(Math.random() * 3)];
        const goldenGlove = cleanSheets > 8 ? 'ВАШ ИГРОК' : ['Куртуа', 'Алиссон', 'Эдерсон'][Math.floor(Math.random() * 3)];
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🏆 НАГРАДЫ ${seasonNumber}-го СЕЗОНА 🏆</h2>
                <div class="award-item">
                    <div class="award-name">⚽ ЗОЛОТОЙ МЯЧ</div>
                    <div class="award-winner">${ballonDor}</div>
                </div>
                <div class="award-item">
                    <div class="award-name">👟 ЗОЛОТАЯ БУТСА</div>
                    <div class="award-winner">${goldenBoot} (${goals} голов)</div>
                </div>
                <div class="award-item">
                    <div class="award-name">🧤 ЛУЧШИЙ ВРАТАРЬ</div>
                    <div class="award-winner">${goldenGlove} (${cleanSheets} сухих матчей)</div>
                </div>
                <div class="award-item">
                    <div class="award-name">📈 РЕЙТИНГ ИГРОКА</div>
                    <div class="award-winner">${avgRating}</div>
                </div>
                <div class="award-item">
                    <div class="award-name">🏆 КЛУБ СЕЗОНА</div>
                    <div class="award-winner">${currentClub.name} (${currentClub.country})</div>
                </div>
                <button class="close-modal" onclick="this.closest('.modal').remove()">✨ ПРОДОЛЖИТЬ ✨</button>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    function updateUI() {
        document.getElementById('monthDisplay').textContent = months[currentMonth] || 'СЕЗОН ЗАВЕРШЕН';
        document.getElementById('seasonDisplay').textContent = `СЕЗОН ${seasonNumber}`;
        document.getElementById('progressDisplay').textContent = `Матчи: ${currentMatch} / 4`;
        document.getElementById('goalsStat').textContent = goals;
        document.getElementById('assistsStat').textContent = assists;
        document.getElementById('cleanSheetsStat').textContent = cleanSheets;
        
        const grid = document.getElementById('matchesGrid');
        grid.innerHTML = '';
        
        if (currentMonth < 12) {
            for (let i = 0; i < 4; i++) {
                const match = matches[currentMonth]?.[i];
                const card = document.createElement('div');
                card.className = `match-card ${match ? 'played' : ''}`;
                card.innerHTML = `
                    <div class="match-number">МАТЧ ${i + 1}</div>
                    ${match ? `
                        <div class="match-result">${match.win ? '🏆 ПОБЕДА' : '💔 ПОРАЖЕНИЕ'}</div>
                        <div class="match-score">${match.goals} : ${match.opponent}</div>
                    ` : `
                        <div class="match-result">⏳ ОЖИДАНИЕ</div>
                        <div class="match-score">- : -</div>
                    `}
                `;
                grid.appendChild(card);
            }
        } else {
            grid.innerHTML = '<div style="grid-column: span 2; text-align: center; color: gold; padding: 0.8rem;">🏆 СЕЗОН ЗАВЕРШЕН! СЫГРАЙТЕ МАТЧ ДЛЯ НОВОГО СЕЗОНА 🏆</div>';
        }
        
        updateCalendar();
        
        const btn = document.getElementById('simulateBtn');
        if (currentMonth >= 12) {
            btn.textContent = '🏆 НАЧАТЬ НОВЫЙ СЕЗОН 🏆';
        } else if (currentMatch === 4) {
            btn.textContent = '➡️ СЛЕДУЮЩИЙ МЕСЯЦ';
        } else {
            btn.textContent = '▶ СЫГРАТЬ МАТЧ (+10 опыта)';
        }
    }
    
    function updateCalendar() {
        const container = document.getElementById('calendarMonths');
        container.innerHTML = '';
        
        for (let i = 0; i < months.length; i++) {
            const playedMatches = matches[i] ? matches[i].filter(m => m !== null).length : 0;
            const isCompleted = playedMatches === 4;
            const isCurrent = i === currentMonth && currentMonth < 12;
            
            const div = document.createElement('div');
            div.className = `calendar-month ${isCurrent ? 'current' : ''} ${isCompleted ? 'completed' : ''}`;
            let statusText = '';
            if (isCompleted) statusText = '✅ ЗАВЕРШЕН';
            else if (isCurrent) statusText = `🎮 ТЕКУЩИЙ (${playedMatches}/4)`;
            else if (i < currentMonth) statusText = '✅ ПРОЙДЕН';
            else statusText = '🔒 НЕ ДОСТУПЕН';
            
            div.innerHTML = `
                <div class="month-name">${months[i]}</div>
                <div class="month-progress">${playedMatches}/4 матчей</div>
                <div class="month-status">${statusText}</div>
            `;
            if (i <= currentMonth && currentMonth < 12) {
                div.style.cursor = 'pointer';
                div.onclick = () => {
                    if (i !== currentMonth && confirm(`Перейти к ${months[i]}?`)) {
                        currentMonth = i;
                        currentMatch = 0;
                        saveGame();
                        updateUI();
                    }
                };
            }
            container.appendChild(div);
        }
    }
    
    // ========== МУЗЫКА ==========
    const musicBtn = document.getElementById('musicBtn');
    const bgMusic = document.getElementById('bgMusic');
    let musicStarted = false;
    
    const musicState = localStorage.getItem('fcGameMusicStarted');
    if (musicState === 'true') {
        musicStarted = true;
        musicBtn.classList.add('hidden');
        bgMusic.play().catch(e => console.log('Автовоспроизведение заблокировано'));
    }
    
    musicBtn.addEventListener('click', () => {
        if (!musicStarted) {
            bgMusic.play().then(() => {
                musicStarted = true;
                musicBtn.classList.add('hidden');
                localStorage.setItem('fcGameMusicStarted', 'true');
                showToast('🎵 МУЗЫКА ВКЛЮЧЕНА! 🎵');
            }).catch(() => showToast('⚠️ Нажмите кнопку ещё раз', false));
        }
    });
    
    document.getElementById('resetSeasonBtn').addEventListener('click', () => {
        if (confirm('Сбросить статистику текущего сезона? Голы, ассисты и прогресс месяцев будут обнулены.')) {
            resetSeasonData(true);
            updateUI();
        }
    });
    
    document.getElementById('simulateBtn').addEventListener('click', simulateMatch);
    document.getElementById('backToMenuBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
    });
    
    const style = document.createElement('style');
    style.textContent = `@keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }`;
    document.head.appendChild(style);
    
    updateRatingDisplay();
    loadGame();
</script>
</body>
</html>
